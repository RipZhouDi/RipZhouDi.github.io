name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 删掉那个 setup-node 步骤，直接给 withastro 传参！
      - name: Install, build, and upload site
        uses: withastro/action@v3
        with:
          node-version: 22    # <-- 关键！必须写在 withastro 的 with 里面
          package-manager: npm # (可选) 明确告诉它用 npm 安装

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4